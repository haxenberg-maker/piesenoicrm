<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CRM Piese Auto — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg:     #0d1117;
    --s1:     #111827;
    --s2:     #1a2235;
    --s3:     #1e293b;
    --border: #1f2d45;
    --b2:     #2d3f5e;
    --accent: #3b82f6;
    --text:   #e2e8f0;
    --muted:  #64748b;
    --green:  #10b981;
    --red:    #ef4444;
  }

  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0 }
  body {
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:20px;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(59,130,246,.07) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(16,185,129,.05) 0%, transparent 50%);
  }

  .card {
    background:var(--s1); border:1px solid var(--border);
    border-radius:20px; padding:40px;
    width:100%; max-width:420px;
    box-shadow: 0 32px 80px rgba(0,0,0,.5);
  }

  .logo {
    text-align:center; margin-bottom:32px;
  }
  .logo-icon { font-size:40px; display:block; margin-bottom:10px }
  .logo h1 { font-size:22px; font-weight:700; letter-spacing:-.3px }
  .logo h1 span { color:var(--accent) }
  .logo p { font-size:13px; color:var(--muted); margin-top:4px }

  .tabs {
    display:flex; background:var(--s2); border-radius:10px;
    padding:4px; margin-bottom:28px; gap:4px;
  }
  .tab-btn {
    flex:1; padding:8px; border:none; border-radius:7px;
    font-size:13px; font-weight:600; cursor:pointer;
    background:transparent; color:var(--muted);
    transition:all .18s;
  }
  .tab-btn.active { background:var(--accent); color:#fff }

  .form { display:flex; flex-direction:column; gap:14px }
  .field { display:flex; flex-direction:column; gap:5px }
  .field label { font-size:12px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:.5px }
  .field input {
    background:var(--s3); border:1px solid var(--b2);
    border-radius:10px; color:var(--text);
    padding:11px 14px; font-size:14px; outline:none;
    font-family:inherit; transition:border-color .15s;
  }
  .field input:focus { border-color:var(--accent) }
  .field input::placeholder { color:var(--muted) }

  .btn-submit {
    background:var(--accent); color:#fff; border:none;
    border-radius:10px; padding:13px; font-size:14px;
    font-weight:600; cursor:pointer; font-family:inherit;
    transition:opacity .15s, transform .1s;
    margin-top:4px;
  }
  .btn-submit:hover { opacity:.9 }
  .btn-submit:active { transform:scale(.98) }
  .btn-submit:disabled { opacity:.5; cursor:not-allowed }

  #error-msg {
    background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3);
    border-radius:8px; padding:10px 14px; font-size:13px;
    color:#fca5a5; display:none;
  }
  #success-msg {
    background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.3);
    border-radius:8px; padding:10px 14px; font-size:13px;
    color:#6ee7b7; display:none; text-align:center;
  }

  .divider {
    display:flex; align-items:center; gap:12px;
    color:var(--muted); font-size:12px; margin:4px 0;
  }
  .divider::before, .divider::after {
    content:''; flex:1; height:1px; background:var(--border);
  }

  .forgot {
    text-align:center; font-size:12px; color:var(--muted);
    margin-top:8px; cursor:pointer;
  }
  .forgot:hover { color:var(--blue) }

  .loading-spinner {
    display:inline-block; width:14px; height:14px;
    border:2px solid rgba(255,255,255,.3); border-top-color:#fff;
    border-radius:50%; animation:spin .6s linear infinite;
    margin-right:6px; vertical-align:middle;
  }
  @keyframes spin { to { transform:rotate(360deg) } }

  #register-form { display:none }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="logo-icon">🔧</span>
    <h1>CRM <span>Piese Auto</span></h1>
    <p>Gestionează comenzile, clienții și stocul</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')"    id="tab-login">Autentificare</button>
    <button class="tab-btn"        onclick="switchTab('register')" id="tab-register">Cont nou</button>
  </div>

  <div id="error-msg"></div>
  <div id="success-msg"></div>

  <!-- LOGIN -->
  <form class="form" id="login-form" onsubmit="handleLogin(event)">
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="adresa@email.com" required autocomplete="email"/>
    </div>
    <div class="field">
      <label>Parolă</label>
      <input type="password" id="login-pass" placeholder="••••••••" required autocomplete="current-password"/>
    </div>
    <button type="submit" class="btn-submit" id="btn-login">Intră în cont →</button>
    <p class="forgot" onclick="handleForgot()">Am uitat parola</p>
  </form>

  <!-- REGISTER -->
  <form class="form" id="register-form" onsubmit="handleRegister(event)">
    <div class="field">
      <label>Nume complet</label>
      <input type="text" id="reg-name" placeholder="Ion Popescu" required autocomplete="name"/>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="adresa@email.com" required autocomplete="email"/>
    </div>
    <div class="field">
      <label>Parolă</label>
      <input type="password" id="reg-pass" placeholder="Min. 8 caractere" required minlength="8" autocomplete="new-password"/>
    </div>
    <div class="field">
      <label>Confirmă parola</label>
      <input type="password" id="reg-pass2" placeholder="Repetă parola" required autocomplete="new-password"/>
    </div>
    <button type="submit" class="btn-submit" id="btn-register">Creează cont →</button>
  </form>
</div>

<script>
const SB  = 'https://ddieqobpxejocfnbmfck.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkaWVxb2JweGVqb2NmbmJtZmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NTMyOTksImV4cCI6MjA4OTMyOTI5OX0.YYEf7zJ_nbuq19FVhbPcZ377KJAY8slNL6JneHmNqYA';

// ── Redirect dacă deja logat ──────────────────────────────────
const saved = localStorage.getItem('crm_session');
if (saved) {
  try {
    const sess = JSON.parse(saved);
    if (sess?.access_token && new Date(sess.expires_at * 1000) > new Date()) {
      window.location.href = '/dashboard.html';
    }
  } catch {}
}

// ── Tab switching ─────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('login-form').style.display    = tab==='login'    ? 'flex' : 'none';
  document.getElementById('register-form').style.display = tab==='register' ? 'flex' : 'none';
  document.getElementById('tab-login').classList.toggle('active',    tab==='login');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
  clearMessages();
}

function showError(msg) {
  const el=document.getElementById('error-msg');
  el.textContent=msg; el.style.display='block';
  document.getElementById('success-msg').style.display='none';
}
function showSuccess(msg) {
  const el=document.getElementById('success-msg');
  el.textContent=msg; el.style.display='block';
  document.getElementById('error-msg').style.display='none';
}
function clearMessages() {
  document.getElementById('error-msg').style.display='none';
  document.getElementById('success-msg').style.display='none';
}
function setLoading(btnId, loading) {
  const btn=document.getElementById(btnId);
  btn.disabled=loading;
  btn.innerHTML = loading
    ? '<span class="loading-spinner"></span>Se procesează...'
    : btnId==='btn-login' ? 'Intră în cont →' : 'Creează cont →';
}

// ── LOGIN ─────────────────────────────────────────────────────
async function handleLogin(e) {
  e.preventDefault();
  clearMessages();
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  setLoading('btn-login', true);

  try {
    const res = await fetch(`${SB}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey':KEY, 'Content-Type':'application/json' },
      body: JSON.stringify({ email, password:pass }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Eroare autentificare');

    // Salvează sesiunea
    localStorage.setItem('crm_session', JSON.stringify(data));
    localStorage.setItem('crm_user', JSON.stringify({
      id:    data.user?.id,
      email: data.user?.email,
      name:  data.user?.user_metadata?.name || email,
    }));

    showSuccess('✅ Autentificat! Redirecționare...');
    setTimeout(()=>{ window.location.href='/dashboard.html'; }, 800);
  } catch(err) {
    showError(err.message);
    setLoading('btn-login', false);
  }
}

// ── REGISTER ──────────────────────────────────────────────────
async function handleRegister(e) {
  e.preventDefault();
  clearMessages();
  const name  = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass  = document.getElementById('reg-pass').value;
  const pass2 = document.getElementById('reg-pass2').value;

  if (pass !== pass2) { showError('Parolele nu coincid!'); return; }
  if (pass.length < 8) { showError('Parola trebuie să aibă minim 8 caractere!'); return; }

  setLoading('btn-register', true);

  try {
    const res = await fetch(`${SB}/auth/v1/signup`, {
      method: 'POST',
      headers: { 'apikey':KEY, 'Content-Type':'application/json' },
      body: JSON.stringify({ email, password:pass, data:{ name } }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Eroare înregistrare');

    if (data.session) {
      // Auto-login dacă email confirmation e dezactivat
      localStorage.setItem('crm_session', JSON.stringify(data.session));
      localStorage.setItem('crm_user', JSON.stringify({ id:data.user?.id, email, name }));
      showSuccess('✅ Cont creat! Redirecționare...');
      setTimeout(()=>{ window.location.href='/dashboard.html'; }, 800);
    } else {
      showSuccess('✅ Cont creat! Verifică email-ul pentru confirmare, apoi loghează-te.');
      switchTab('login');
    }
  } catch(err) {
    showError(err.message);
  } finally {
    setLoading('btn-register', false);
  }
}

// ── FORGOT PASSWORD ───────────────────────────────────────────
async function handleForgot() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showError('Introdu email-ul în câmpul de mai sus.'); return; }
  try {
    await fetch(`${SB}/auth/v1/recover`, {
      method:'POST',
      headers:{'apikey':KEY,'Content-Type':'application/json'},
      body:JSON.stringify({ email }),
    });
    showSuccess('📧 Email de resetare trimis! Verifică inbox-ul.');
  } catch(e) { showError('Eroare trimitere email.'); }
}
</script>
</body>
</html>
